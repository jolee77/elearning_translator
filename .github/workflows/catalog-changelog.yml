name: Catalog Changelog Sync

on:
  push:
    branches: [main, master, develop]

jobs:
  sync-changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Send changelog to System Catalog
        env:
          CATALOG_API_URL: ${{ secrets.CATALOG_API_URL }}
          CATALOG_SYSTEM_ID: ${{ secrets.CATALOG_SYSTEM_ID }}
          CATALOG_TOKEN: ${{ secrets.CATALOG_TOKEN }}
        run: |
          if [ -z "$CATALOG_API_URL" ] || [ -z "$CATALOG_SYSTEM_ID" ] || [ -z "$CATALOG_TOKEN" ]; then
            echo "ERROR: Missing secrets. Set CATALOG_API_URL, CATALOG_SYSTEM_ID, CATALOG_TOKEN."
            exit 1
          fi

          BASE_URL="${CATALOG_API_URL%/}"
          CHANGELOG_URL="${BASE_URL}/systems/${CATALOG_SYSTEM_ID}/changelog"

          echo "Waking up catalog (Render free tier may sleep)..."
          for i in $(seq 1 12); do
            WAKE_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "${BASE_URL}/health" || echo "000")
            echo "Wake attempt $i: HTTP $WAKE_CODE"
            if [ "$WAKE_CODE" = "200" ]; then
              break
            fi
            sleep 10
          done

          if [ "$WAKE_CODE" != "200" ]; then
            echo "ERROR: Catalog did not wake up in time"
            exit 1
          fi

          COMMIT_SHA="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"
          AUTHOR="${{ github.actor }}"
          MESSAGE=$(git log -1 --pretty=%B)
          COMMITTED_AT=$(git log -1 --pretty=%cI)

          PAYLOAD=$(jq -n \
            --arg commit_sha "$COMMIT_SHA" \
            --arg branch "$BRANCH" \
            --arg author "$AUTHOR" \
            --arg message "$MESSAGE" \
            --arg committed_at "$COMMITTED_AT" \
            '{commit_sha: $commit_sha, branch: $branch, author: $author, message: $message, committed_at: $committed_at}')

          echo "POST $CHANGELOG_URL"

          for i in $(seq 1 3); do
            HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" --max-time 90 -X POST "$CHANGELOG_URL" \
              -H "Authorization: Bearer ${CATALOG_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" || echo "000")

            echo "Attempt $i - Response:"
            cat /tmp/response.txt
            echo ""
            echo "HTTP status: $HTTP_CODE"

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "Changelog synced successfully."
              exit 0
            fi

            sleep 15
          done

          exit 1
